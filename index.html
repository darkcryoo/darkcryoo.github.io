<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tặng Coffee</title>
    <link rel="icon" type="image/x-icon" href="./icon-cf.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <link rel="stylesheet" href="./app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css">

</head>

<body>
    <nav class="navbar bg-body-tertiary shadow">
        <div class="container">
            <a class="navbar-brand" href="/">
                <span style="font-size: 17px;">
                    <img class="rounded" src="./icon-cf.jpg" alt="Logo Website" height="50" width="50"> Mua cho tớ cốc coffee
                </span>
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-8 col-sm-12 mt-5">
                <div class="card">
                    <div class="card-body">

                        <div class="d-flex justify-content-center">
                            <div class="hca-mark">
                                <p>
                                    Bạn đang sử dụng dịch vụ mua coffee tự cung tự cấp của HCA 🤣🤣
                                </p>
                            </div>
                        </div>

                        <h4 class="card-title text-center">Quét mã QR chuyển tiền</h4>
                        <p class="card-text text-center mt-3">Sử dụng <b>Mobile Banking</b> hỗ trợ QR code để quét mã</p>
                        <div class="d-flex justify-content-center mb-5">
                            <img src="https://cdn.discordapp.com/attachments/933563675250421762/1056500201390616626/979916417a6fa231fb7e.jpg" width="250" height="275" alt="qr">
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-sm-12 mt-5">
                <div class="card">
                    <div class="card-body">
                        <h4 class="card-title" style="font-size: 20px">Thông tin giao dịch</h4>
                        <p class="text-muted mt-3" style="font-size: 14px">Người nhận</p>
                        <h4 class="card-title mb-4" style="font-size: 20px">Hà Công Anh</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
</body>


</html>
